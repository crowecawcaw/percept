[package]
name = "percept"
version = "0.1.0"
edition = "2021"
description = "CLI tool that annotates screenshots using OmniParser and provides computer interaction via block IDs"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
ort = { version = "2.0.0-rc.9", features = ["load-dynamic", "ndarray"] }
ndarray = "0.16"
image = "0.25"
imageproc = "0.25"
ab_glyph = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
base64 = "0.22"
tempfile = "3"
dirs = "6"
toml = "0.8"
reqwest = { version = "0.12", features = ["stream"] }
indicatif = "0.17"
sha2 = "0.10"
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
anyhow = "1"
futures-util = "0.3"

[profile.release]
strip = true
lto = true
codegen-units = 1

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
